name: Sora
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    TARGETED_DEVICE_FAMILY: 1
    MARKETING_VERSION: 0.1
    CURRENT_PROJECT_VERSION: 1
    BUNDLE_IDENTIFIER: com.local.sora
    DEVELOPMENT_TEAM: ""
    PRODUCT_BUNDLE_IDENTIFIER: $(BUNDLE_IDENTIFIER)
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
targets:
  Sora:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sora
    settings:
      base:
        PRODUCT_NAME: SoraProbe
        PRODUCT_BUNDLE_IDENTIFIER: $(BUNDLE_IDENTIFIER)
        INFOPLIST_FILE: Sora/Supporting/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: SoraProbe
        INFOPLIST_KEY_NSCameraUsageDescription: Sora needs camera access to show the live camera preview and record filtered video.
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: Sora needs permission to save recorded videos to your photo library.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
schemes:
  Sora:
    build:
      targets:
        Sora: all
    run:
      config: Debug
    archive:
      config: Release
