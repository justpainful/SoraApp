name: Sora
options:
  bundleIdPrefix: com.local
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    TARGETED_DEVICE_FAMILY: 1
    MARKETING_VERSION: 0.1
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
targets:
  Sora:
    type: application
    platform: iOS
    sources:
      - path: Sora
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.sora
        INFOPLIST_FILE: Sora/Supporting/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
    info:
      path: Sora/Supporting/Info.plist
  SoraTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SoraTests
    dependencies:
      - target: Sora
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.sora.tests
        GENERATE_INFOPLIST_FILE: YES
