name: iOS IPA Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen if missing
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen version

      - name: Generate project
        run: bash ./Scripts/bootstrap_project.sh

      - name: Clean build directory
        run: rm -rf build build-output

      - name: Build unsigned Sideloadly IPA
        run: bash ./Scripts/build_ipa.sh

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sora-build-output
          path: |
            build-output
            build/export
            build/Sora.xcarchive
          if-no-files-found: warn
