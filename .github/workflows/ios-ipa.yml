name: iOS IPA Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
      BUNDLE_IDENTIFIER: ${{ secrets.BUNDLE_IDENTIFIER }}
      EXPORT_METHOD: ${{ secrets.EXPORT_METHOD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen if missing
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen version

      - name: Generate project
        run: bash ./Scripts/bootstrap_project.sh

      - name: Clean build directory
        run: rm -rf build build-output

      - name: Build archive or compile verification
        run: bash ./Scripts/build_ipa.sh

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sora-build-output
          path: |
            build-output
            build/export
            build/Sora.xcarchive
          if-no-files-found: warn
